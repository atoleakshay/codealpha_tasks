[XRayAuth]
# Network interface to monitor (e.g., eth0, wlan0, enp0s3)
interface = eth0

# Log file path for storing detection results
log = /home/user/xrayauth_logs.json

# Additional token patterns (regex)
# Uncomment and modify as needed
# custom_token_pattern_1 = Authorization: Basic (.*?)\r\n
# custom_token_pattern_2 = X-Auth-Token: (.*?)\r\n

# HTTPS proxy settings (for mitmproxy)
# proxy_port = 8080
# proxy_host = 0.0.0.0

# Detection sensitivity settings
# max_session_age = 3600  # seconds
# alert_threshold = 1     # number of anomalies before alert